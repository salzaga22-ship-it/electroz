<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro Z — Tecnología a tu ritmo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --ez-blue:#1A56FF;--ez-yellow:#FFD600;--ez-dark:#0D0D0D;--ez-white:#FAFAFA;
    --ez-surface:#F2F4F8;--ez-muted:#6B7280;--ez-border:#E5E7EB;
    --font-brand:'Barlow Condensed',sans-serif;--font-ui:'Inter',sans-serif;
  }
  body{font-family:var(--font-ui);background:var(--ez-white);color:var(--ez-dark);min-height:100vh}
  nav{background:var(--ez-dark);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .brand{display:flex;align-items:center}
  .nav-links{display:flex;gap:4px}
  .nav-btn{background:none;border:none;color:#9CA3AF;font-family:var(--font-ui);font-size:13px;cursor:pointer;padding:6px 12px;border-radius:6px;transition:all .15s}
  .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.08);color:var(--ez-white)}
  .nav-btn.admin-btn{color:var(--ez-yellow);margin-left:8px}
  .cart-pill{background:var(--ez-blue);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-family:var(--font-ui);display:flex;align-items:center;gap:6px}
  .cart-count{background:var(--ez-yellow);color:var(--ez-dark);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .view{display:none;animation:fadeIn .2s ease}
  .view.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .hero{background:var(--ez-dark);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'⚡';font-size:200px;position:absolute;top:-30px;right:-20px;opacity:.04;line-height:1}
  .hero h1{font-family:var(--font-brand);font-size:52px;font-weight:800;color:var(--ez-white);line-height:.95;letter-spacing:2px}
  .hero h1 span{color:var(--ez-yellow)}
  .hero p{color:#9CA3AF;font-size:15px;margin-top:10px;max-width:360px;margin-left:auto;margin-right:auto}
  .hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(26,86,255,.2);border:1px solid rgba(26,86,255,.4);color:#7BA7FF;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;margin-bottom:16px}
  .filter-bar{padding:16px 20px;display:flex;gap:8px;overflow-x:auto;background:var(--ez-surface);border-bottom:1px solid var(--ez-border)}
  .filter-chip{background:#fff;border:1px solid var(--ez-border);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--font-ui)}
  .filter-chip:hover{border-color:var(--ez-blue);color:var(--ez-blue)}
  .filter-chip.active{background:var(--ez-blue);border-color:var(--ez-blue);color:#fff}
  .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:20px}
  .product-card{background:#fff;border:1px solid var(--ez-border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer}
  .product-card:hover{border-color:var(--ez-blue);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,86,255,.12)}
  .product-img{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:56px;background:var(--ez-surface)}
  .product-body{padding:12px}
  .product-category{font-size:11px;color:var(--ez-muted);text-transform:uppercase;letter-spacing:.5px}
  .product-name{font-weight:600;font-size:14px;margin:3px 0 8px;line-height:1.3}
  .product-price{font-family:var(--font-brand);font-size:22px;font-weight:700;color:var(--ez-blue)}
  .product-cuota{font-size:12px;color:var(--ez-muted);margin-top:2px}
  .cuota-highlight{color:var(--ez-dark);font-weight:600}
  .product-btn{width:100%;background:var(--ez-blue);color:#fff;border:none;border-radius:8px;padding:9px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;transition:background .15s}
  .product-btn:hover{background:#1244E0}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end}
  .modal-overlay.open{display:flex}
  .modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:24px 20px 32px;animation:slideUp .25s ease;position:relative}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .modal-handle{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:0 auto 20px}
  .modal-product-emoji{font-size:72px;text-align:center;margin-bottom:12px}
  .modal-title{font-family:var(--font-brand);font-size:28px;font-weight:800;line-height:1.1}
  .modal-price{font-family:var(--font-brand);font-size:36px;font-weight:800;color:var(--ez-blue);margin:8px 0}
  .modal-desc{font-size:14px;color:var(--ez-muted);line-height:1.6;margin-bottom:20px}
  .simulator{background:var(--ez-surface);border-radius:12px;padding:16px;margin-bottom:20px}
  .sim-title{font-size:13px;font-weight:600;color:var(--ez-dark);margin-bottom:12px}
  .sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .sim-option{background:#fff;border:1.5px solid var(--ez-border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
  .sim-option.active{border-color:var(--ez-blue);background:rgba(26,86,255,.05)}
  .sim-option .weeks{font-size:11px;color:var(--ez-muted)}
  .sim-option .amount{font-family:var(--font-brand);font-size:20px;font-weight:700;color:var(--ez-dark)}
  .sim-option.active .amount{color:var(--ez-blue)}
  .sim-option .label{font-size:11px;font-weight:600;color:var(--ez-muted);margin-bottom:2px}
  .initial-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .initial-input{flex:1;border:1px solid var(--ez-border);border-radius:8px;padding:8px 12px;font-family:var(--font-ui);font-size:14px;background:#fff}
  .initial-label{font-size:12px;color:var(--ez-muted);white-space:nowrap}
  .add-cart-btn{width:100%;background:var(--ez-dark);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--font-brand);font-size:20px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:background .15s}
  .add-cart-btn:hover{background:#222}
  .add-cart-btn span{color:var(--ez-yellow)}
  .close-modal{position:absolute;top:20px;right:20px;background:var(--ez-surface);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cart-wrapper{max-width:560px;margin:0 auto;padding:20px}
  .cart-title{font-family:var(--font-brand);font-size:32px;font-weight:800;margin-bottom:20px}
  .cart-empty{text-align:center;padding:60px 0;color:var(--ez-muted);font-size:15px}
  .cart-item{background:#fff;border:1px solid var(--ez-border);border-radius:12px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:10px}
  .cart-emoji{font-size:36px;background:var(--ez-surface);border-radius:8px;width:56px;height:56px;display:flex;align-items:center;justify-content:center}
  .cart-item-info{flex:1}
  .cart-item-name{font-weight:600;font-size:14px}
  .cart-item-plan{font-size:12px;color:var(--ez-muted);margin-top:2px}
  .cart-item-price{font-family:var(--font-brand);font-size:18px;font-weight:700;color:var(--ez-blue)}
  .cart-remove{background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:18px;padding:4px}
  .cart-total{background:var(--ez-dark);color:#fff;border-radius:12px;padding:16px 20px;margin-top:16px;display:flex;justify-content:space-between;align-items:center}
  .cart-total-label{font-size:14px;color:#9CA3AF}
  .cart-total-amount{font-family:var(--font-brand);font-size:28px;font-weight:800;color:var(--ez-yellow)}
  .checkout-btn{width:100%;background:var(--ez-blue);color:#fff;border:none;border-radius:12px;padding:14px;font-family:var(--font-brand);font-size:20px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .15s}
  .checkout-btn:hover{background:#1244E0}
  .wa-note{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ez-muted);margin-top:10px;justify-content:center}
  .wa-dot{width:8px;height:8px;background:#25D366;border-radius:50%}
  .admin-wrapper{padding:20px;max-width:700px;margin:0 auto}
  .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .admin-title{font-family:var(--font-brand);font-size:32px;font-weight:800}
  .admin-subtitle{font-size:13px;color:var(--ez-muted)}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
  .stat-card{background:#fff;border:1px solid var(--ez-border);border-radius:12px;padding:14px}
  .stat-label{font-size:12px;color:var(--ez-muted);margin-bottom:4px}
  .stat-value{font-family:var(--font-brand);font-size:28px;font-weight:800;color:var(--ez-dark)}
  .stat-sub{font-size:11px;color:var(--ez-muted)}
  .admin-section{margin-bottom:24px}
  .section-label{font-size:13px;font-weight:600;color:var(--ez-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .product-row{background:#fff;border:1px solid var(--ez-border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .row-emoji{font-size:28px}
  .row-info{flex:1}
  .row-name{font-weight:600;font-size:14px}
  .row-price{font-size:13px;color:var(--ez-blue);font-weight:600}
  .row-cat{font-size:11px;color:var(--ez-muted)}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--ez-surface);color:var(--ez-muted)}
  .badge.active{background:#DCFCE7;color:#166534}
  .add-btn{background:var(--ez-blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer}
  .form-card{background:#fff;border:1px solid var(--ez-border);border-radius:14px;padding:20px;margin-bottom:20px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  label{font-size:12px;font-weight:600;color:var(--ez-muted);text-transform:uppercase;letter-spacing:.3px}
  input,select,textarea{border:1px solid var(--ez-border);border-radius:8px;padding:9px 12px;font-family:var(--font-ui);font-size:14px;background:#fff;color:var(--ez-dark);width:100%;outline:none}
  input:focus,select:focus{border-color:var(--ez-blue)}
  .save-btn{width:100%;background:var(--ez-dark);color:#fff;border:none;border-radius:10px;padding:12px;font-family:var(--font-brand);font-size:18px;font-weight:700;cursor:pointer;margin-top:16px}
  .save-btn:hover{background:#222}
  .order-row{background:#fff;border:1px solid var(--ez-border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .order-header{display:flex;justify-content:space-between;align-items:center}
  .order-name{font-weight:600;font-size:14px}
  .order-meta{font-size:12px;color:var(--ez-muted);margin-top:2px}
  .order-total{font-family:var(--font-brand);font-size:18px;font-weight:700;color:var(--ez-blue)}
  .status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
  .status-pending{background:#FEF3C7;color:#92400E}
  .status-active{background:#DCFCE7;color:#166534}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ez-dark);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;transition:transform .3s;white-space:nowrap;border-left:4px solid var(--ez-yellow)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .wa-input{width:100%;border:1px solid var(--ez-border);border-radius:8px;padding:9px 12px;font-family:var(--font-ui);font-size:14px;background:#fff;color:var(--ez-dark);outline:none;margin-bottom:8px}
  .wa-input:focus{border-color:var(--ez-blue)}
  .wa-section{background:var(--ez-surface);border-radius:12px;padding:14px;margin-bottom:16px}
  .wa-section-title{font-size:12px;font-weight:600;color:var(--ez-muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
  @media(max-width:480px){
    .hero h1{font-size:38px}
    .product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:14px}
    .stats-row{grid-template-columns:1fr 1fr}
    .form-grid{grid-template-columns:1fr}
    .form-group.full{grid-column:1}
    .nav-links{display:none}
  }
</style>
</head>

      <div id="adminProductList"></div>
    </div>
    <div class="admin-section">
      <div class="section-label">Pedidos recientes</div>
      <div id="ordersList"></div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal" onclick="closeModal(event)">
  <div class="modal-sheet" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN — Cambia tu número de WhatsApp aquí
// ============================================================
const WA_NUMBER = '573136515321'; // Ej: 573102345678 (sin + ni espacios)

// ============================================================
// DATOS INICIALES DE PRODUCTOS
// ============================================================
let products = JSON.parse(localStorage.getItem('ez_products') || 'null') || [
  {id:1,name:'Licuadora Ultrapotente',category:'Cocina',price:185000,emoji:'🫙',desc:'Motor 600W, vaso de 1.5L con tapa antigoteo. Ideal para jugos, batidos y sopas.'},
  {id:2,name:'Smartwatch Fit Pro',category:'Wearable',price:220000,emoji:'⌚',desc:'Monitor cardíaco, oxímetro, GPS integrado. Batería 7 días. Resistente al agua.'},
  {id:3,name:'Audífonos Inalámbricos',category:'Audio',price:140000,emoji:'🎧',desc:'Cancelación de ruido activa, 30h de batería, carga rápida USB-C. Bluetooth 5.0.'},
  {id:4,name:'Plancha de Cabello Pro',category:'Cuidado personal',price:95000,emoji:'💇',desc:'Placas de titanio, temperatura hasta 230°C, calentamiento en 30 segundos.'},
  {id:5,name:'Freidora de Aire 4L',category:'Cocina',price:280000,emoji:'🍟',desc:'4 litros de capacidad, pantalla digital, 8 presets automáticos. Sin aceite.'},
  {id:6,name:'Banda Fitness Sport',category:'Wearable',price:75000,emoji:'📿',desc:'Pasos, calorías, sueño. Notificaciones del celular. Carga magnética. Batería 10 días.'},
  {id:7,name:'Parlante Bluetooth Potente',category:'Audio',price:160000,emoji:'🔊',desc:'30W de potencia, resistencia IPX7, 12 horas de batería, luces LED.'},
  {id:8,name:'Ventilador Torre Digital',category:'Electrodoméstico',price:210000,emoji:'🌀',desc:'3 velocidades, temporizador 8h, control remoto, modo nocturno silencioso.'}
];

let orders = JSON.parse(localStorage.getItem('ez_orders') || 'null') || [
  {id:1,client:'Carlos Montoya',phone:'311-555-1234',items:['Smartwatch Fit Pro'],plan:'Mensual 3 cuotas',total:220000,status:'active',date:'20 jun'},
  {id:2,client:'Luisa Bermúdez',phone:'317-888-4321',items:['Audífonos + Freidora'],plan:'Quincenal 6 cuotas',total:420000,status:'pending',date:'22 jun'},
  {id:3,client:'Andrés Pinto',phone:'300-222-9988',items:['Licuadora'],plan:'Semanal 8 cuotas',total:185000,status:'active',date:'24 jun'}
];

let cart = [];
let selectedProduct = null;
let selectedPlan = 0;
let initialPayment = 0;

const PLANES = [
  {label:'Semanal',cuotas:8,factor:1.12},
  {label:'Quincenal',cuotas:6,factor:1.10},
  {label:'Mensual',cuotas:3,factor:1.08},
  {label:'Contado',cuotas:1,factor:1.00}
];

function saveProducts(){ localStorage.setItem('ez_products', JSON.stringify(products)); }
function saveOrders(){ localStorage.setItem('ez_orders', JSON.stringify(orders)); }

function fmt(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(Math.round(n))}

function cuotaAmount(price,planIdx,initial){
  const p=PLANES[planIdx];
  const base=(price-initial)*p.factor;
  return Math.round(base/p.cuotas);
}

function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(v==='catalog') document.querySelectorAll('.nav-btn')[0].classList.add('active');
  if(v==='cart'){document.querySelectorAll('.nav-btn')[1].classList.add('active');renderCart();}
  if(v==='admin'){document.querySelectorAll('.nav-btn')[2].classList.add('active');renderAdmin();}
}

function getCategories(){return['Todos',...new Set(products.map(p=>p.category))];}

let activeFilter='Todos';
function renderFilters(){
  document.getElementById('filterBar').innerHTML=getCategories().map(c=>
    `<button class="filter-chip${c===activeFilter?' active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat){activeFilter=cat;renderFilters();renderProducts();}

function renderProducts(){
  const filtered=activeFilter==='Todos'?products:products.filter(p=>p.category===activeFilter);
  document.getElementById('productGrid').innerHTML=filtered.map(p=>`
    <div class="product-card" onclick="openModal(${p.id})">
      <div class="product-img">${p.emoji}</div>
      <div class="product-body">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">${fmt(p.price)}</div>
        <div class="product-cuota">Desde <span class="cuota-highlight">${fmt(cuotaAmount(p.price,0,0))}</span>/semana</div>
        <button class="product-btn">Ver detalles</button>
      </div>
    </div>
  `).join('');
}

function openModal(id){
  selectedProduct=products.find(p=>p.id===id);
  selectedPlan=0;initialPayment=0;
  renderModal();
  document.getElementById('productModal').classList.add('open');
}

function renderModal(){
  const p=selectedProduct;
  const initVal=initialPayment||0;
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-handle"></div>
    <button class="close-modal" onclick="closeModal()">✕</button>
    <div class="modal-product-emoji">${p.emoji}</div>
    <div style="font-size:12px;color:var(--ez-muted);text-transform:uppercase;letter-spacing:.5px">${p.category}</div>
    <div class="modal-title">${p.name}</div>
    <div class="modal-price">${fmt(p.price)}</div>
    <p class="modal-desc">${p.desc}</p>
    <div class="simulator">
      <div class="sim-title">⚡ Elige tu plan de pago</div>
      <div class="initial-row">
        <div class="initial-label">Cuota inicial:</div>
        <input class="initial-input" type="number" placeholder="0" value="${initVal}" oninput="setInitial(this.value)" min="0" max="${p.price}" step="5000">
        <div class="initial-label" style="font-weight:600;color:var(--ez-blue)">${fmt(initVal)}</div>
      </div>
      <div class="sim-grid">
        ${PLANES.map((pl,i)=>`
          <div class="sim-option${i===selectedPlan?' active':''}" onclick="setPlan(${i})">
            <div class="label">${pl.label}</div>
            <div class="amount">${fmt(cuotaAmount(p.price,i,initVal))}</div>
            <div class="weeks">${pl.cuotas===1?'Pago único':pl.cuotas+' cuotas'}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <button class="add-cart-btn" onclick="addToCart()">AGREGAR AL PEDIDO <span>→</span></button>
  `;
}

function setPlan(i){selectedPlan=i;renderModal();}
function setInitial(v){
  initialPayment=Math.min(Math.max(0,parseInt(v)||0),selectedProduct.price);
  renderModal();
}

function closeModal(e){
  if(!e||e.target===document.getElementById('productModal')){
    document.getElementById('productModal').classList.remove('open');
  }
}

function addToCart(){
  const p=selectedProduct;
  const plan=PLANES[selectedPlan];
  cart.push({
    id:Date.now(),product:p,
    planLabel:plan.label,cuotas:plan.cuotas,
    cuotaAmt:cuotaAmount(p.price,selectedPlan,initialPayment),
    initial:initialPayment,total:p.price
  });
  document.getElementById('cartCount').textContent=cart.length;
  document.getElementById('productModal').classList.remove('open');
  showToast('✓ Agregado al pedido');
}

function renderCart(){
  const el=document.getElementById('cartItems');
  const footer=document.getElementById('cartFooter');
  if(cart.length===0){
    el.innerHTML='<div class="cart-empty">Tu carrito está vacío.<br><br>Explora el catálogo y elige tus productos 🛍️</div>';
    footer.innerHTML='';return;
  }
  el.innerHTML=cart.map(item=>`
    <div class="cart-item">
      <div class="cart-emoji">${item.product.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.product.name}</div>
        <div class="cart-item-plan">Plan ${item.planLabel} · ${item.cuotas===1?'Contado':item.cuotas+' cuotas de '+fmt(item.cuotaAmt)}</div>
        ${item.initial>0?`<div style="font-size:11px;color:var(--ez-muted)">Inicial: ${fmt(item.initial)}</div>`:''}
      </div>
      <div>
        <div class="cart-item-price">${fmt(item.total)}</div>
        <button class="cart-remove" onclick="removeFromCart(${item.id})">✕</button>
      </div>
    </div>
  `).join('');
  const total=cart.reduce((s,i)=>s+i.total,0);
  footer.innerHTML=`
    <div class="cart-total">
      <div><div class="cart-total-label">Total pedido</div><div style="font-size:12px;color:#9CA3AF">${cart.length} producto${cart.length>1?'s':''}</div></div>
      <div class="cart-total-amount">${fmt(total)}</div>
    </div>
    <button class="checkout-btn" onclick="sendWhatsApp()">ENVIAR PEDIDO POR WHATSAPP ↗</button>
    <div class="wa-note"><div class="wa-dot"></div>Se abrirá WhatsApp Business de Electro Z</div>
  `;
}

function removeFromCart(id){
  cart=cart.filter(i=>i.id!==id);
  document.getElementById('cartCount').textContent=cart.length;
  renderCart();
}

function sendWhatsApp(){
  const name=document.getElementById('clientName').value.trim();
  const phone=document.getElementById('clientPhone').value.trim();
  const city=document.getElementById('clientCity').value.trim();
  let msg='🛒 *Pedido Electro Z*\n\n';
  if(name) msg+=`👤 Cliente: ${name}\n`;
  if(phone) msg+=`📱 Contacto: ${phone}\n`;
  if(city) msg+=`📍 Ubicación: ${city}\n`;
  if(name||phone||city) msg+='\n';
  cart.forEach(item=>{
    msg+=`• ${item.product.emoji} *${item.product.name}* — ${fmt(item.total)}\n`;
    msg+=`  Plan: ${item.planLabel}, ${item.cuotas===1?'Contado':item.cuotas+' cuotas de '+fmt(item.cuotaAmt)}\n`;
    if(item.initial>0) msg+=`  Inicial: ${fmt(item.initial)}\n`;
    msg+='\n';
  });
  const total=cart.reduce((s,i)=>s+i.total,0);
  msg+=`💰 *Total: ${fmt(total)}*\n\nQuedo pendiente de su confirmación. ¡Gracias! 🙏`;
  
  const newOrder={
    id:Date.now(),
    client:name||'Cliente web',
    phone:phone||'No indicado',
    items:cart.map(i=>i.product.name),
    plan:cart.map(i=>`${i.planLabel} ${i.cuotas} cuotas`).join(', '),
    total:total,
    status:'pending',
    date:new Date().toLocaleDateString('es-CO',{day:'numeric',month:'short'})
  };
  orders.unshift(newOrder);
  saveOrders();
  
  window.open('https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(msg),'_blank');
  showToast('✓ Pedido enviado por WhatsApp');
}

function renderAdmin(){
  const ordersTotal=orders.reduce((s,o)=>s+o.total,0);
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Productos</div><div class="stat-value">${products.length}</div><div class="stat-sub">en catálogo</div></div>
    <div class="stat-card"><div class="stat-label">Pedidos activos</div><div class="stat-value">${orders.filter(o=>o.status==='active').length}</div><div class="stat-sub">en cobro</div></div>
    <div class="stat-card"><div class="stat-label">Cartera</div><div class="stat-value" style="font-size:18px">${fmt(ordersTotal)}</div><div class="stat-sub">total registrada</div></div>
  `;
  document.getElementById('adminProductList').innerHTML=products.map(p=>`
    <div class="product-row">
      <div class="row-emoji">${p.emoji}</div>
      <div class="row-info">
        <div class="row-name">${p.name}</div>
        <div style="display:flex;gap:8px;margin-top:2px"><span class="row-cat">${p.category}</span></div>
      </div>
      <div style="text-align:right">
        <div class="row-price">${fmt(p.price)}</div>
        <span class="badge active">Activo</span>
      </div>
      <button style="background:none;border:none;cursor:pointer;color:#9CA3AF;font-size:16px;padding:4px" onclick="deleteProduct(${p.id})">✕</button>
    </div>
  `).join('');
  document.getElementById('ordersList').innerHTML=orders.map(o=>`
    <div class="order-row">
      <div class="order-header">
        <div>
          <div class="order-name">${o.client}</div>
          <div class="order-meta">${o.phone} · ${Array.isArray(o.items)?o.items.join(', '):o.items} · ${o.date}</div>
        </div>
        <div style="text-align:right">
          <div class="order-total">${fmt(o.total)}</div>
          <span class="status-badge ${o.status==='active'?'status-active':'status-pending'}">${o.status==='active'?'✓ Activo':'Pendiente'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

let formVisible=false;
function toggleForm(){
  formVisible=!formVisible;
  document.getElementById('addForm').style.display=formVisible?'block':'none';
}

function addProduct(){
  const name=document.getElementById('f-name').value.trim();
  const price=parseInt(document.getElementById('f-price').value)||0;
  const cat=document.getElementById('f-cat').value;
  const emoji=document.getElementById('f-emoji').value||'📦';
  const desc=document.getElementById('f-desc').value.trim();
  if(!name||!price){showToast('Completa nombre y precio');return;}
  products.push({id:Date.now(),name,category:cat,price,emoji,desc:desc||'Producto de Electro Z'});
  saveProducts();
  document.getElementById('f-name').value='';
  document.getElementById('f-price').value='';
  document.getElementById('f-emoji').value='';
  document.getElementById('f-desc').value='';
  toggleForm();
  renderAdmin();renderFilters();renderProducts();
  showToast('✓ Producto agregado');
}

function deleteProduct(id){
  if(!confirm('¿Eliminar este producto?')) return;
  products=products.filter(p=>p.id!==id);
  saveProducts();
  renderAdmin();renderFilters();renderProducts();
  showToast('Producto eliminado');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

renderFilters();
renderProducts();
</script>
</body>
</html>
